name: Sync to Organization

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SYNC_TOKEN }}

      - name: Push to PPCFT
        run: |
          git remote add destination https://x-access-token:${{ secrets.SYNC_TOKEN }}@github.com/PPCFT/GenTab.git
          # Wypychamy gałąź main oraz wszystkie tagi
          git push destination main --force
          git push destination --tags --force
