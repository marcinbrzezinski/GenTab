name: Sync to Organization

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SYNC_TOKEN }}
          persist-credentials: false # Ważne: zapobiega konfliktom tokenów

      - name: Push to PPCFT
        run: |
          git remote add destination https://x-access-token:${{ secrets.SYNC_TOKEN }}@github.com/PPCFT/GenTab.git
          # Wymuszamy pobranie najświeższych danych z Twojego repo
          git fetch origin main
          # Wypychamy HEAD (aktualny stan) bezpośrednio do main w organizacji
          git push destination HEAD:main --force --tags

